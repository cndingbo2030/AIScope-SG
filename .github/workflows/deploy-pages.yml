name: Deploy AIScope SG

# GitHub Pages serves the `web/` folder from branch `gh-pages`. Pushes that do not
# touch any path below will NOT redeploy; the live site can lag until the next deploy.
on:
  push:
    branches: ["main"]
    paths:
      - "data/processed/**"
      - "data/raw/**"
      - "pipeline/**"
      - "web/**"
      - "scripts/validate_data.py"
      - "scripts/pre_deploy_check.py"
      - "scripts/generate_insights.py"
      - "scripts/translate_data.py"
      - "run_pipeline.py"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: write
  # Required so the workflow can clear a stale Pages custom domain (e.g. aiscope.sg)
  # that would otherwise 301 all github.io traffic away from this project site.
  pages: write

concurrency:
  group: "gh-pages-deploy"
  cancel-in-progress: true

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch data.gov.sg wage extract (best-effort, fallback-safe)
        env:
          DATA_GOV_SG_API_KEY: ${{ secrets.DATA_GOV_SG_API_KEY }}
        run: python run_pipeline.py --fetch

      - name: Gatekeeper — validate data schema and audit
        run: python scripts/validate_data.py

      - name: Build insights payload for web/data/insights.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_insights.py

      - name: Pre-deploy — fix absolute paths and verify SEO
        run: python scripts/pre_deploy_check.py

      - name: Verify index.html uses relative asset paths
        run: |
          set -e
          bad=$(grep -E '(href|src)="/' web/index.html | grep -v 'https://' | grep -v '//' || true)
          if [ -n "$bad" ]; then
            echo "ERROR: index.html still contains root-absolute href/src (breaks /repo/ GitHub Pages URLs):"
            echo "$bad"
            exit 1
          fi
          echo "OK: no root-absolute href/src in index.html"

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: web
          clean: true
          commit-message: "chore: deploy AIScope SG static site"

      - name: Remove Pages custom domain (restore default github.io URL)
        env:
          OPTIONAL_PAT: ${{ secrets.AISCOPE_PAGES_ADMIN_TOKEN }}
          GITHUB_TOKEN_BUILTIN: ${{ github.token }}
        run: |
          set -uo pipefail
          # Custom domain in Settings → Pages forces 301 from github.io to that host.
          # Clearing cname requires an API token with permission to update Pages; the
          # default GITHUB_TOKEN is often 403 on PUT — use optional PAT or fix manually.
          if [ -n "${OPTIONAL_PAT:-}" ]; then export GH_TOKEN="$OPTIONAL_PAT"
          else export GH_TOKEN="$GITHUB_TOKEN_BUILTIN"
          fi
          API="repos/${{ github.repository }}/pages"
          HDR=( -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" )
          if ! gh api "$API" "${HDR[@]}" > /tmp/pages.json 2>/tmp/pages-get.err; then
            echo "::warning::Could not read Pages settings (see below). If github.io redirects to aiscope.sg, open Repo Settings → Pages and remove Custom domain."
            cat /tmp/pages-get.err || true
            exit 0
          fi
          jq '
            {
              cname: null,
              https_enforced: (.https_enforced // true),
              build_type: (.build_type // "legacy"),
              source: .source
            }
            | if .source == null then del(.source) else . end
          ' /tmp/pages.json > /tmp/pages-put.json
          if ! gh api --method PUT "$API" "${HDR[@]}" --input /tmp/pages-put.json 2>/tmp/pages-put.err; then
            echo "::warning::Could not clear Pages custom domain via API (403 is common for GITHUB_TOKEN)."
            echo "::warning::Fix: (1) Repo Settings → Pages → delete Custom domain and Save, OR"
            echo "::warning::    (2) Settings → Actions → General → Workflow permissions → Read and write, OR"
            echo "::warning::    (3) Add repo secret AISCOPE_PAGES_ADMIN_TOKEN (classic PAT with repo scope)."
            cat /tmp/pages-put.err || true
            exit 0
          fi
          echo "::notice::Pages custom domain cleared (cname=null); github.io URL should stop redirecting."
